name: Deploy Frontend

# Build + deploy the SPA to the Summit network on every push to main (and on
# manual dispatch). There is no PR-preview deploy: the only Bulletin uploader
# (5Fk8) is Summit-authorized and isn't a paseo signer, and Summit previews each
# cost a DotNS registration (~2 SUM) + a 14-day Bulletin upload. PR validation is
# unit tests (see e2e.yml).
#
# Deploy CLI: @polkadot-community-foundation/polkadot-app-deploy@0.11.0 — it ships
# the built-in `summit` env. deploy.sh passes --mnemonic (direct signer),
# --config, --js-merkle and --no-transfer-to-signedin-user.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-w3spay-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # npm bug #4828: lockfiles generated on macOS can omit Linux optional
        # native packages. Resolve fresh on the runner so Rollup/PAPI native
        # packages are present for this platform.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Install deploy tool
        run: npm install -g @polkadot-community-foundation/polkadot-app-deploy@0.11.0

      - name: Deploy customer app to Summit
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: ./deploy.sh "w3spaycheckout.dot"
        env:
          # The Bulletin-authorized Summit uploader (5Fk8) that owns
          # w3spaycheckout.dot — signs both the Bulletin upload and the DotNS bind.
          MNEMONIC: ${{ secrets.DOTNS_MNEMONIC }}
          BULLETIN_ENV: summit
          VITE_NETWORK: summit
          # Summit W3SPayRegistry (from w3spay-admin). Override via the repo var
          # after a registry redeploy; otherwise this known-good default is baked
          # (src/config.ts carries the same summit default).
          VITE_W3SPAY_REGISTRY_ADDRESS: ${{ vars.VITE_W3SPAY_REGISTRY_ADDRESS_SUMMIT || '0xf76dadbbc112738275ed398d15c0e8c47b2550f2' }}
          VITE_W3SPAY_PILOT_MERCHANT_ID: ${{ vars.VITE_W3SPAY_PILOT_MERCHANT_ID || 'funkhaus' }}
          NODE_OPTIONS: '--max-old-space-size=8192'
