name: Deploy Frontend

# Build + deploy the SPA to the Summit network on every push to main (and on
# manual dispatch). There is no PR-preview deploy: the only Bulletin uploader
# (5Fk8) is Summit-authorized and isn't a paseo signer, and Summit previews each
# cost a DotNS registration (~2 SUM) + a 14-day Bulletin upload. PR validation is
# unit tests (see e2e.yml).
#
# Deploy CLI: @polkadot-community-foundation/polkadot-app-deploy@0.12.0 — it ships
# the built-in `summit` env AND wires Summit's Publisher, so --publish lists the
# app in the browse directory (no-op before v0.11.1). deploy.sh passes --publish
# (BULLETIN_DEPLOY_PUBLISH=true), --mnemonic (direct signer), --config, --js-merkle
# and --no-transfer-to-signedin-user.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-w3spay-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # npm bug #4828: lockfiles generated on macOS can omit Linux optional
        # native packages. Resolve fresh on the runner so Rollup/PAPI native
        # packages are present for this platform.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Install deploy tool
        run: npm install -g @polkadot-community-foundation/polkadot-app-deploy@0.12.0

      - name: Deploy customer app to devnet
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 30
          command: ./deploy.sh "w3spaycheckout.dot"
        env:
          # The Bulletin-authorized devnet uploader (5Fk8) that owns w3spaycheckout.dot
          # — signs both the Bulletin upload and the DotNS bind. The domain is
          # baked into the build as the product identity (the deeplink), so it
          # MUST be w3spay.dot (was w3spaycheckout.dot, which broke the deeplink).
          # NOTE: w3spay.dot is a 6-char PoP-gated name — it must be pre-registered
          # to 5Fk8 via the registerReserved owner-override before this runs,
          # otherwise the DotNS bind fails.
          MNEMONIC: ${{ secrets.DOTNS_MNEMONIC }}
          BULLETIN_ENV: devnet
          VITE_NETWORK: devnet
          # List the checkout SPA in the browse app-directory: deploy.sh passes
          # --publish, which calls on-chain Publisher.publish() on Summit. The
          # deploy signer (5Fk8) owns the Publisher, so this is gateless. Requires
          # the CLI at >=0.11.1 (pinned above), which wires Summit's Publisher.
          BULLETIN_DEPLOY_PUBLISH: 'true'
          # Devnet W3SPayRegistry on Paseo AH 1000 (from w3spay-admin). Override
          # via the repo var after a registry redeploy; otherwise this known-good
          # default is baked (src/config.ts carries the same devnet default).
          VITE_W3SPAY_REGISTRY_ADDRESS: ${{ vars.VITE_W3SPAY_REGISTRY_ADDRESS_DEVNET || '0x950c0243cb112abe1112924f1fcab04fb03ae670' }}
          VITE_W3SPAY_PILOT_MERCHANT_ID: ${{ vars.VITE_W3SPAY_PILOT_MERCHANT_ID || 'funkhaus' }}
          NODE_OPTIONS: '--max-old-space-size=8192'
