name: Unpublish from browse (Summit)

# Remove a label from the on-chain Summit `browse` Publisher
# (Publisher.unpublish, 0xf5fe0fc9…). Signed by the deploy account (5Fk8 via
# DOTNS_MNEMONIC), which owns the label. Idempotent: no-ops if already removed.
#
# Used to retire the old w3spaycheckout.dot listing once the checkout app moves
# to w3spay.dot (the deploy re-publishes w3spay.dot via --publish).

on:
  workflow_dispatch:
    inputs:
      domain:
        description: "Domain to unpublish (e.g. w3spaycheckout.dot)"
        required: true
        default: "w3spaycheckout.dot"

permissions:
  contents: read

concurrency:
  # One signer (5Fk8) signs serially on-chain — never run alongside a deploy.
  group: deploy-summit-w3spay
  cancel-in-progress: false

jobs:
  unpublish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deploy tool
        run: npm install -g @polkadot-community-foundation/polkadot-app-deploy@0.12.1

      - name: Unpublish ${{ inputs.domain }}
        env:
          MNEMONIC: ${{ secrets.DOTNS_MNEMONIC }}
        run: |
          set -euo pipefail
          [ -n "$MNEMONIC" ] || { echo "::error::secrets.DOTNS_MNEMONIC (the 5Fk8 deployer mnemonic) is not set"; exit 1; }
          polkadot-app-deploy --unpublish "${{ inputs.domain }}" --env paseo-next --mnemonic "$MNEMONIC"
